<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAAM | Saharanpur</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: #fff; text-align: center; margin: 0; }
        header { padding: 60px 20px; background: #111; border-bottom: 3px solid #ff3e3e; }
        h1 { font-size: 4rem; margin: 0; letter-spacing: 5px; color: #fff; }
        .tagline { color: #ff3e3e; font-weight: bold; margin-top: 10px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; padding: 30px; }
        .gallery img { width: 100%; height: 450px; object-fit: cover; border-radius: 10px; border: 2px solid #222; }
        .insta-btn { display: inline-block; padding: 15px 35px; background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; margin: 30px 0; }
    </style>
</head>
<body>

<header>
    <h1>MAAM</h1>
    <div class="tagline">SAHARANPUR | CREATOR | AUTOMOTIVE</div>
</header>

<div class="gallery">
    <img src="K" alt="Shot 1">
    <img src="K1" alt="Shot 2">
    <img src="K2" alt="Shot 3">
    <img src="K3" alt="Shot 4">
</div>

<footer>
    <a href="https://www.instagram.com/" target="_blank" class="insta-btn">Instagram Pe Aao</a>
    <p style="color: #444;">© 2026 MAAM</p>
</footer>

</body>
</html>
