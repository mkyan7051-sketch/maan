<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAAM | The Visionary Creator</title>
    <style>
        :root { --main-blue: #2b59c3; --rgb-speed: 3s; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #080808; color: #fff; text-align: center; margin: 0; overflow-x: hidden; }
        
        @keyframes rgbText {
            0% { color: #ff0000; text-shadow: 0 0 20px #ff0000; }
            33% { color: #00ff00; text-shadow: 0 0 20px #00ff00; }
            66% { color: #0000ff; text-shadow: 0 0 20px #0000ff; }
            100% { color: #ff0000; text-shadow: 0 0 20px #ff0000; }
        }

        header { padding: 60px 20px; background: radial-gradient(circle, #151515 0%, #000 100%); border-bottom: 1px solid #222; }
        h1 { font-size: 4rem; animation: rgbText var(--rgb-speed) infinite linear; margin: 0; letter-spacing: 10px; text-transform: uppercase; }

        /* Pricing Section */
        .pricing-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 50px 20px; }
        .price-card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 30px; width: 260px; transition: 0.3s; }
        .price-card:hover { transform: translateY(-10px); border-color: #ff3e3e; }
        .price-card h3 { font-size: 1.5rem; margin: 0; }
        .price-card .cost { font-size: 2.5rem; color: #ff3e3e; margin: 15px 0; font-weight: bold; }
        .pay-btn { background: #fff; color: #000; padding: 12px; width: 100%; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Professional Payment Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: flex-start; overflow-y: auto; padding: 20px 0; }
        .payment-container { width: 100%; max-width: 400px; background: white; border-radius: 10px; overflow: hidden; color: #333; text-align: left; }
        .pay-header { background: var(--main-blue); color: white; padding: 15px; text-align: center; font-weight: bold; }
        .amount-box { text-align: center; padding: 15px; border-bottom: 1px solid #eee; }
        .qr-section { text-align: center; padding: 15px; }
        .qr-section img { width: 200px; border: 1px solid #ddd; border-radius: 5px; }
        .upi-copy-box { background: #f9f9f9; border: 1px dashed var(--main-blue); margin: 10px 15px; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { background: var(--main-blue); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .utr-section { padding: 15px; }
        .utr-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 25px; margin-bottom: 10px; outline: none; }
        .submit-btn { width: 100%; padding: 12px; background: var(--main-blue); color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .close-modal { color: white; font-size: 30px; position: absolute; right: 20px; top: 10px; cursor: pointer; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 30px; }
        .gallery img { width: 100%; height: 400px; object-fit: cover; border-radius: 10px; border: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <h1>MAAM</h1>
    <p style="color: #666; letter-spacing: 2px;">THE VISIONARY CREATOR</p>
</header>

<div class="pricing-container">
    <div class="price-card">
        <h3>BASIC</h3>
        <div class="cost">₹99</div>
        <button class="pay-btn" onclick="openPayment(99)">Get Basic</button>
    </div>
    <div class="price-card" style="border-color: #ff3e3e;">
        <h3 style="color: #ff3e3e;">SILVER</h3>
        <div class="cost">₹499</div>
        <button class="pay-btn" style="background:#ff3e3e; color:#fff;" onclick="openPayment(499)">Get Silver</button>
    </div>
    <div class="price-card">
        <h3>GOLD</h3>
        <div class="cost">₹999</div>
        <button class="pay-btn" onclick="openPayment(999)">Get Gold</button>
    </div>
</div>

<div class="gallery">
    <img src="K" alt="1"><img src="K1" alt="2"><img src="K2" alt="3"><img src="K3" alt="4">
</div>

<div id="payModal" class="modal">
    <span class="close-modal" onclick="closePayment()">&times;</span>
    <div class="payment-container">
        <div class="pay-header">UPI Payment Gateway</div>
        <div class="amount-box">
            <p style="margin:0; color:#888; font-size: 0.8rem;">Order ID: TXN7733365</p>
            <span style="font-size: 2rem; font-weight: bold; color: var(--main-blue);">₹<span id="price-tag">99</span></span>
        </div>
        <div class="qr-section">
            <img src="MM.jpeg" alt="QR Code">
            <p style="font-size: 0.8rem; font-weight: bold;">Scan to pay with any UPI app</p>
        </div>
        <div class="upi-copy-box">
            <span id="upi-id" style="font-weight: bold;">Kyanmaan@fam</span>
            <button class="copy-btn" onclick="copyUPI()">Copy</button>
        </div>
        <div class="utr-section">
            <p style="font-size: 0.8rem; font-weight: bold; color: red; margin-bottom: 5px;">Input 12-digit UTR here</p>
            <input type="text" class="utr-input" placeholder="Enter Ref Number / UTR">
            <button class="submit-btn" onclick="alert('Submitted! We will verify shortly.')">Submit Ref Number</button>
        </div>
    </div>
</div>

<script>
    function openPayment(amt) {
        document.getElementById('price-tag').innerText = amt;
        document.getElementById('payModal').style.display = 'flex';
    }
    function closePayment() {
        document.getElementById('payModal').style.display = 'none';
    }
    function copyUPI() {
        var id = document.getElementById('upi-id').innerText;
        navigator.clipboard.writeText(id);
        alert("Copied: " + id);
    }
    window.onclick = function(e) { if(e.target == document.getElementById('payModal')) closePayment(); }
</script>

</body>
</html>
